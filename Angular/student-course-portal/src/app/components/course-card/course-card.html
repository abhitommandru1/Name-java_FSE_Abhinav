<div
  class="course-card"
  [ngClass]="cardClasses"
  [ngStyle]="{ 'border-left-color': borderColor }"
  appHighlight="yellow"
>
  <h3><a [routerLink]="['/courses', course.id]">{{ course.name }}</a></h3>
  <p>Code: {{ course.code }}</p>
  <p>Credits: {{ course.credits | creditLabel }}</p>

  <span [ngSwitch]="course.gradeStatus" class="badge">
    <span *ngSwitchCase="'passed'" class="badge--passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge--failed">Failed</span>
    <span *ngSwitchDefault class="badge--pending">Pending</span>
  </span>

  <div class="actions">
    <button type="button" (click)="onEnrollClick()">
      {{ isEnrolled ? 'Unenroll' : 'Enroll' }}
    </button>
    <button type="button" (click)="toggleExpanded()">Show Details</button>
  </div>

  @if (isExpanded) {
    <p class="details">Extra details for {{ course.name }} ({{ course.code }}).</p>
  }
</div>
