server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Route all /api/products/** to product-service via Eureka
        - id: product-service-route
          uri: lb://product-service
          predicates:
            - Path=/api/products/**

        # Route all /api/orders/** to order-service via Eureka
        - id: order-service-route
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**

        # Route all /api/accounts/** to account-service via Eureka
        - id: account-service-route
          uri: lb://account-service
          predicates:
            - Path=/api/accounts/**

        # Route all /api/loans/** to loan-service via Eureka
        - id: loan-service-route
          uri: lb://loan-service
          predicates:
            - Path=/api/loans/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
